# in the 1.9.12 release of bitcoin-s we changed the
# database connection pool size from 1 -> 4 by default
# when integrating the library into opreturnbot I uncovered
# a bug where we weren't cleaning the database tables
# inbetween test runs in InvoiceMonitorTest
# for now set this to 1 to avoid the issue
# follow https://github.com/bitcoin-s/bitcoin-s/issues/6300
# for more information and a proper fix
bitcoin-s.dbDefault.db.numThreads = 1

bitcoin-s {
	lnd {
		datadir = ${HOME}/.lnd
		binary = ${HOME}/.bitcoin-s/binaries/lnd/lnd-linux-amd64-v0.15.0-beta/lnd
	}

	opreturnbot = ${bitcoin-s.dbDefault}
	opreturnbot.db.name = invoices
}

